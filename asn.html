<!DOCTYPE html> 
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FC Asnières</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav-blue full-width">
    <div class="nav-content">
      <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=224,fit=crop,q=95/AMq41Gq7pRUQ0lVX/img-20211126-wa0003-AE04Pe2w36hP8v6V.PNG" alt="Logo FC Asnières" class="logo"/>
      <div class="nav-links">
        <a href="asn.html">Accueil</a>
        <a href="equipes.html">Équipes</a>
        <a href="galerie.html">Galerie</a>
        <a href="contact.html">Contact</a>
        <a href="apropos.html">À propos</a>
      </div>
      <div class="nav-right">
        <a href="https://www.skita.fr/" target="_blank" rel="noopener noreferrer">
          <img src="https://www.skita.fr/theme/skita/images/logo.svg" alt="Logo skita" class="logo"/></a>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Orange_logo.svg/2048px-Orange_logo.svg.png" alt="Logo orange" class="logo"/>
      </div>
    </div>
  </nav>

  <!-- SLIDER -->
  <section class="slider" aria-label="Slider d'images" style="position:relative; height:500px; overflow:hidden;">
    <div class="slides" style="height:100%; display:flex; transition: transform 0.5s ease;">
      <div class="slide" style="min-width:100%; background: url('https://assets.zyrosite.com/AMq41Gq7pRUQ0lVX/img_5432-YKbrW2KWGNC29aze.jpeg') center/cover no-repeat; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; padding:20px;"></div>
      <div class="slide" style="min-width:100%; background: url('https://assets.zyrosite.com/AMq41Gq7pRUQ0lVX/img_4093-YNqr7l1oalc5aOnG.jpeg') center/cover no-repeat; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; padding:20px;"></div>
      <div class="slide" style="min-width:100%; background: url('https://assets.zyrosite.com/AMq41Gq7pRUQ0lVX/img_1544-AwvkaBx11OtwMgaP.jpg') center/cover no-repeat; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; padding:20px;"></div>
    </div>
    <div class="dots" aria-label="Navigation du slider" style="position:absolute; bottom:15px; left:50%; transform: translateX(-50%); display:flex; gap:10px;">
      <span class="dot active" data-index="0" style="width:12px; height:12px; border-radius:50%; background:#fff; opacity:0.7; cursor:pointer;"></span>
      <span class="dot" data-index="1" style="width:12px; height:12px; border-radius:50%; background:#fff; opacity:0.4; cursor:pointer;"></span>
      <span class="dot" data-index="2" style="width:12px; height:12px; border-radius:50%; background:#fff; opacity:0.4; cursor:pointer;"></span>
    </div>
  </section>

  <!-- CONTENU PRINCIPAL -->
  <main class="home-sections container">
    <!-- Prochain match -->
    <section class="next-match-block card">
      <h2>Prochain match à domicile</h2>
      <div class="match-card" id="nextMatchContainer">

      </div>
    </section>

    <!-- Classement -->
    <section class="ranking-block card">
      <h2>CLASSEMENT SENIORS D3</h2>
      <div class="see-full-ranking">
        <a href="classement-complet.html">CLASSEMENT COMPLET</a>
      </div>
      <table class="league-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Équipe</th>
            <th>Pts</th>
            <th>J</th>
            <th>G</th>
            <th>N</th>
            <th>P</th>
            <th>+/-</th>
          </tr>
        </thead>
        <tbody id="leagueTableBody">
          <!-- Injecté par JS -->
        </tbody>
      </table>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 FC Asnières. Tous droits réservés.</p>
  </footer>

  <script src="classement.js"></script>
  <script src="asn.js"></script>
  
  <script src="slider.js"></script>
</body>
</html>

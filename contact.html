<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - FC Asnières</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav-blue full-width">
    <div class="nav-content">
      <img src="https://assets.zyrosite.com/cdn-cgi/image/format=auto,w=224,fit=crop,q=95/AMq41Gq7pRUQ0lVX/img-20211126-wa0003-AE04Pe2w36hP8v6V.PNG" alt="Logo FC Asnières" class="logo"/>
      <div class="nav-links">
        <a href="asn.html">Accueil</a>
        <a href="equipes.html">Équipes</a>
        <a href="galerie.html">Galerie</a>
        <a href="contact.html">Contact</a>
        <a href="apropos.html">À propos</a>
      </div>
      <div class="nav-right">
        <a href="https://www.skita.fr/" target="_blank" rel="noopener noreferrer">
          <img src="https://www.skita.fr/theme/skita/images/logo.svg" alt="Logo Skita" class="logo"/></a>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Orange_logo.svg/2048px-Orange_logo.svg.png" alt="Logo Orange" class="logo"/>
      </div>
    </div>
  </nav>

  <main class="section-block-full">
    <h1 class="section-title">CONTACT</h1>
    <div class="contact-wrapper">
      <div class="contact-infos">
        <div class="contact-info-item">
          <span class="contact-icon">📍</span>
          <div>
            <strong>Adresse</strong>
            <p>Stade Blaise Matuidi<br>Asnières-sur-Seine, 92600</p>
          </div>
        </div>
        <div class="contact-info-item">
          <span class="contact-icon">📧</span>
          <div>
            <strong>Email</strong>
            <p><a href="mailto:500038@lpiff.fr">500038@lpiff.fr</a></p>
          </div>
        </div>
        <div class="contact-info-item">
          <span class="contact-icon">📞</span>
          <div>
            <strong>Téléphone</strong>
            <p><a href="tel:+33141213876">01 41 21 38 76</a></p>
          </div>
        </div>
      </div>
      <form class="contact-form" onsubmit="handleContact(event)">
        <input type="text" placeholder="Votre nom" required />
        <input type="email" placeholder="Votre email" required />
        <textarea rows="5" placeholder="Votre message" required></textarea>
        <button type="submit">Envoyer</button>
        <p id="contact-success" style="display:none;color:#2ecc71;font-weight:bold;margin-top:10px;">✅ Message envoyé !</p>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 FC Asnières. Tous droits réservés.</p>
  </footer>

  <script>
    function handleContact(e) {
      e.preventDefault();
      document.getElementById('contact-success').style.display = 'block';
      e.target.reset();
      setTimeout(() => document.getElementById('contact-success').style.display = 'none', 4000);
    }
  </script>
</body>
</html>
